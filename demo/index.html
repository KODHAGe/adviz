<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>adviz — particle field</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0304;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      #app canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
        cursor: crosshair;
      }

      #overlay {
        position: fixed;
        bottom: 24px;
        left: 24px;
        color: rgba(220, 130, 160, 0.40);
        font-size: 11px;
        letter-spacing: 0.10em;
        line-height: 2.0;
        pointer-events: none;
        user-select: none;
      }

      #overlay .label {
        color: rgba(240, 170, 190, 0.22);
        padding-right: 6px;
      }

      #badge {
        position: fixed;
        top: 20px;
        left: 24px;
        color: rgba(220, 130, 160, 0.28);
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        pointer-events: none;
        user-select: none;
      }

      #error {
        display: none;
        position: fixed;
        inset: 0;
        background: #0a0304;
        color: #d4477a;
        font-family: 'SF Mono', monospace;
        font-size: 13px;
        padding: 48px;
        white-space: pre;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="badge">adviz</div>

    <div id="overlay">
      <span class="label">move</span>gravity field<br />
      <span class="label">left drag</span>attract<br />
      <span class="label">right drag</span>repel<br />
      <span class="label">double click</span>burst<br />
      <span class="label">middle drag</span>vortex
    </div>

    <div id="error"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
