<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>adviz — particle field</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'SF Mono', 'Fira Code', monospace;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      #app canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      #overlay {
        position: fixed;
        bottom: 24px;
        left: 24px;
        color: rgba(255, 255, 255, 0.35);
        font-size: 11px;
        letter-spacing: 0.08em;
        line-height: 1.8;
        pointer-events: none;
        user-select: none;
      }

      #error {
        display: none;
        position: fixed;
        inset: 0;
        background: #000;
        color: #ff4444;
        font-family: 'SF Mono', monospace;
        font-size: 14px;
        padding: 40px;
        white-space: pre;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="overlay">
      adviz / particle field<br />
      move mouse to attract · click to repel
    </div>
    <div id="error"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
